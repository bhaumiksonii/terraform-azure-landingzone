image: hashicorp/terraform:1.9

pipelines:
  default:
    - step:
        name: Terraform Plan
        oidc: true
        script:
          - export ARM_CLIENT_ID=$AZURE_CLIENT_ID
          - export ARM_TENANT_ID=$AZURE_TENANT_ID
          - export ARM_SUBSCRIPTION_ID=$AZURE_SUBSCRIPTION_ID
          - export ARM_USE_OIDC=true
          - export TF_VARS_FILE=${TF_VARS_FILE:-environments/dev.tfvars}
          - test -f "$TF_VARS_FILE" || (echo "Missing tfvars file: $TF_VARS_FILE" && exit 1)
          - terraform init -reconfigure
          - terraform validate
          - terraform plan -var-file="$TF_VARS_FILE"

  branches:
    main:
      - step:
          name: Terraform Plan & Apply
          oidc: true
          deployment: production
          script:
            - export ARM_CLIENT_ID=$AZURE_CLIENT_ID
            - export ARM_TENANT_ID=$AZURE_TENANT_ID
            - export ARM_SUBSCRIPTION_ID=$AZURE_SUBSCRIPTION_ID
            - export ARM_USE_OIDC=true
            - export TF_VARS_FILE=${TF_VARS_FILE:-environments/dev.tfvars}
            - test -f "$TF_VARS_FILE" || (echo "Missing tfvars file: $TF_VARS_FILE" && exit 1)
            - terraform init -reconfigure
            - terraform validate
            - terraform plan -var-file="$TF_VARS_FILE" -out=tfplan
            - terraform apply tfplan
